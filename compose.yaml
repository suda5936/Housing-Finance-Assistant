name: homefit-ai

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homefit}
      POSTGRES_USER: ${POSTGRES_USER:-homefit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_homefit_password}
    ports:
      - "5432:5432"
    volumes:
      - homefit-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  homefit-postgres:
